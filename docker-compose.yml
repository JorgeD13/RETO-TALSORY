version: "3.9"

# Orquestador raíz: levanta frontend, go-api y node-api en red compartida.
# Uso: docker compose up --build

services:

  # ── Frontend (Vite + React + Nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - go-api
    networks:
      - app-network

  # ── API Go (Fiber) ────────────────────────────────────────────────────────────
  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    container_name: go-api
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      APP_ENV: "production"
      NODE_API_URL: "http://node-api:3000/api/v1/statistics"
    depends_on:
      - node-api
    restart: unless-stopped
    networks:
      - app-network

  # ── API Node.js (Express) ─────────────────────────────────────────────────────
  node-api:
    build:
      context: ./node-api
      dockerfile: Dockerfile
    container_name: node-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "production"
      PORT: "3000"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
