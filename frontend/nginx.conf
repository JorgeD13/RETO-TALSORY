server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para la Go API: el browser llama a /api/*, nginx lo reenvía
    # internamente a go-api:8080 usando la red Docker compartida.
    location /api/ {
        proxy_pass         http://go-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback: cualquier ruta no encontrada devuelve index.html
    # para que React Router (si se añade) funcione correctamente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
